name: Build Plugin

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEXUS_USER: ${{ secrets.NEXUS_USER }}
      NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
      AES_KEY: ${{ secrets.AES_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect affected components
        id: changes
        shell: bash
        env:
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail

          core=false
          bungee=false
          velocity=false

          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            core=true
            bungee=true
            velocity=true
          else
            zero_sha="0000000000000000000000000000000000000000"
            if [[ -n "$BEFORE_SHA" && "$BEFORE_SHA" != "$zero_sha" ]] && git cat-file -e "$BEFORE_SHA^{commit}" 2>/dev/null; then
              commit_range="$BEFORE_SHA..$GITHUB_SHA"
            elif git rev-parse "$GITHUB_SHA^" >/dev/null 2>&1; then
              commit_range="$GITHUB_SHA^..$GITHUB_SHA"
            else
              commit_range="$GITHUB_SHA"
            fi

            git diff-tree --no-commit-id --name-only -r "$commit_range" > build-changed-files.txt

            while IFS= read -r file; do
              case "$file" in
                src/*)
                  core=true
                  ;;
                bungee-bridge/*)
                  bungee=true
                  ;;
                velocity-bridge/*)
                  velocity=true
                  ;;
                build.gradle.kts|settings.gradle.kts|gradle.properties|gradlew|gradlew.bat|gradle/*|buildSrc/*)
                  core=true
                  bungee=true
                  velocity=true
                  ;;
              esac
            done < build-changed-files.txt
          fi

          any=false
          if [[ "$core" == true || "$bungee" == true || "$velocity" == true ]]; then
            any=true
          fi

          {
            echo "core=$core"
            echo "bungee=$bungee"
            echo "velocity=$velocity"
            echo "any=$any"
          } >> "$GITHUB_OUTPUT"

          printf 'Affected components: core=%s bungee=%s velocity=%s\n' "$core" "$bungee" "$velocity"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build with Gradle
        run: ./gradlew clean build

      - name: Save Gradle Actions report
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/reports/gradle-actions
          latest_report=$(find /home/runner/work/_temp/.gradle-actions/build-results -type f -name '__run_*' | sort | tail -n 1)
          test -n "$latest_report"
          cp "$latest_report" build/reports/gradle-actions/build-results.json

      - name: Upload build results
        uses: actions/upload-artifact@v7
        with:
          name: gradle-build-results
          path: build/reports/gradle-actions/build-results.json
          retention-days: 1
          if-no-files-found: error

      - name: Prepare JAR files
        id: jars
        shell: bash
        run: |
          set -euo pipefail

          plugin_version=$(sed -n 's/^punisherxVersion=//p' gradle.properties | head -n 1)
          bridge_version=$(sed -n 's/^bridgeVersion=//p' gradle.properties | head -n 1)
          short_sha=$(printf '%s' "$GITHUB_SHA" | cut -c1-7)

          test -n "$plugin_version"
          test -n "$bridge_version"

          core_source=$(printf 'build/libs/PunisherX-%s.jar' "$plugin_version")
          bungee_source=$(printf 'bungee-bridge/build/libs/PunisherX-BungeeCord-Bridge-%s.jar' "$bridge_version")
          velocity_source=$(printf 'velocity-bridge/build/libs/PunisherX-Velocity-Bridge-%s.jar' "$bridge_version")

          test -f "$core_source"
          test -f "$bungee_source"
          test -f "$velocity_source"

          mkdir -p build/ci-artifacts
          core_name=$(printf 'PunisherX-Paper-%s-%s.jar' "$plugin_version" "$short_sha")
          bungee_name=$(printf 'PunisherX-BungeeCord-Bridge-%s.jar' "$bridge_version")
          velocity_name=$(printf 'PunisherX-Velocity-Bridge-%s.jar' "$bridge_version")

          cp "$core_source" "build/ci-artifacts/$core_name"
          cp "$bungee_source" "build/ci-artifacts/$bungee_name"
          cp "$velocity_source" "build/ci-artifacts/$velocity_name"

          {
            echo "core_path=build/ci-artifacts/$core_name"
            echo "core_name=$core_name"
            echo "bungee_path=build/ci-artifacts/$bungee_name"
            echo "bungee_name=$bungee_name"
            echo "velocity_path=build/ci-artifacts/$velocity_name"
            echo "velocity_name=$velocity_name"
          } >> "$GITHUB_OUTPUT"

      - name: Upload core JAR
        id: core_artifact
        if: github.event_name == 'pull_request' || steps.changes.outputs.core == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.jars.outputs.core_name }}
          path: ${{ steps.jars.outputs.core_path }}
          archive: false
          retention-days: 7
          if-no-files-found: error

      - name: Upload bungee-bridge JAR
        id: bungee_artifact
        if: github.event_name == 'pull_request' || steps.changes.outputs.bungee == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.jars.outputs.bungee_name }}
          path: ${{ steps.jars.outputs.bungee_path }}
          archive: false
          retention-days: 7
          if-no-files-found: error

      - name: Upload velocity-bridge JAR
        id: velocity_artifact
        if: github.event_name == 'pull_request' || steps.changes.outputs.velocity == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.jars.outputs.velocity_name }}
          path: ${{ steps.jars.outputs.velocity_path }}
          archive: false
          retention-days: 7
          if-no-files-found: error

      - name: Prepare Build Explorer payloads
        if: github.event_name == 'push' && steps.changes.outputs.any == 'true'
        shell: bash
        env:
          BEFORE_SHA: ${{ github.event.before }}
          CORE_CHANGED: ${{ steps.changes.outputs.core }}
          BUNGEE_CHANGED: ${{ steps.changes.outputs.bungee }}
          VELOCITY_CHANGED: ${{ steps.changes.outputs.velocity }}
          CORE_ARTIFACT_URL: ${{ steps.core_artifact.outputs.artifact-url }}
          BUNGEE_ARTIFACT_URL: ${{ steps.bungee_artifact.outputs.artifact-url }}
          VELOCITY_ARTIFACT_URL: ${{ steps.velocity_artifact.outputs.artifact-url }}
          CORE_PATH: ${{ steps.jars.outputs.core_path }}
          BUNGEE_PATH: ${{ steps.jars.outputs.bungee_path }}
          VELOCITY_PATH: ${{ steps.jars.outputs.velocity_path }}
          CORE_NAME: ${{ steps.jars.outputs.core_name }}
          BUNGEE_NAME: ${{ steps.jars.outputs.bungee_name }}
          VELOCITY_NAME: ${{ steps.jars.outputs.velocity_name }}
        run: |
          set -euo pipefail

          zero_sha="0000000000000000000000000000000000000000"
          if [[ -n "$BEFORE_SHA" && "$BEFORE_SHA" != "$zero_sha" ]] && git cat-file -e "$BEFORE_SHA^{commit}" 2>/dev/null; then
            commit_range="$BEFORE_SHA..$GITHUB_SHA"
          elif git rev-parse "$GITHUB_SHA^" >/dev/null 2>&1; then
            commit_range="$GITHUB_SHA^..$GITHUB_SHA"
          else
            commit_range="$GITHUB_SHA"
          fi

          write_commits() {
            output=$1
            shift
            ndjson="$output.ndjson"
            : > "$ndjson"

            while IFS= read -r -d '' sha \
              && IFS= read -r -d '' commit_time \
              && IFS= read -r -d '' message; do
              jq -cn \
                --arg sha "$sha" \
                --arg time "$commit_time" \
                --arg message "$message" \
                '{sha: $sha, time: $time, message: $message}' \
                >> "$ndjson"
            done < <(git log --reverse --format='%H%x00%cI%x00%B%x00' "$commit_range" -- "$@")

            jq -s '.' "$ndjson" > "$output"
            rm "$ndjson"
          }

          write_payload() {
            output=$1
            artifact_name=$2
            artifact_path=$3
            artifact_url=$4
            server=$5
            commits_file=$6

            test -n "$artifact_url"
            sha256=$(sha256sum "$artifact_path" | cut -d ' ' -f 1)
            size=$(stat -c '%s' "$artifact_path")
            build_time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')

            jq -n \
              --argjson id "$GITHUB_RUN_NUMBER" \
              --arg time "$build_time" \
              --arg channel "DEV" \
              --slurpfile commits "$commits_file" \
              --arg server "$server" \
              --arg name "$artifact_name" \
              --arg sha256 "$sha256" \
              --argjson size "$size" \
              --arg url "$artifact_url" \
              '{
                id: $id,
                time: $time,
                channel: $channel,
                commits: $commits[0],
                downloads: {
                  ("server:" + $server): {
                    name: $name,
                    checksums: {sha256: $sha256},
                    size: $size,
                    url: $url
                  }
                }
              }' > "$output"
          }

          if [[ "$CORE_CHANGED" == true ]]; then
            write_commits build/core-commits.json \
              src build.gradle.kts settings.gradle.kts gradle.properties gradle gradlew gradlew.bat buildSrc
            write_payload build/punisherx.json "$CORE_NAME" "$CORE_PATH" "$CORE_ARTIFACT_URL" paper build/core-commits.json
          fi

          if [[ "$BUNGEE_CHANGED" == true ]]; then
            write_commits build/bungee-commits.json \
              bungee-bridge build.gradle.kts settings.gradle.kts gradle.properties gradle gradlew gradlew.bat buildSrc
            write_payload build/punisherx-bungeecord-bridge.json \
              "$BUNGEE_NAME" "$BUNGEE_PATH" "$BUNGEE_ARTIFACT_URL" bungeecord build/bungee-commits.json
          fi

          if [[ "$VELOCITY_CHANGED" == true ]]; then
            write_commits build/velocity-commits.json \
              velocity-bridge build.gradle.kts settings.gradle.kts gradle.properties gradle gradlew gradlew.bat buildSrc
            write_payload build/punisherx-velocity-bridge.json \
              "$VELOCITY_NAME" "$VELOCITY_PATH" "$VELOCITY_ARTIFACT_URL" velocity build/velocity-commits.json
          fi

      - name: Publish affected DEV builds to Build Explorer
        if: github.event_name == 'push' && steps.changes.outputs.any == 'true'
        shell: bash
        env:
          BUILD_CI_TOKEN: ${{ secrets.BUILD_CI_TOKEN }}
          CORE_CHANGED: ${{ steps.changes.outputs.core }}
          BUNGEE_CHANGED: ${{ steps.changes.outputs.bungee }}
          VELOCITY_CHANGED: ${{ steps.changes.outputs.velocity }}
        run: |
          set -euo pipefail
          test -n "$BUILD_CI_TOKEN"

          publish() {
            slug=$1
            payload=$2

            curl --fail-with-body \
              --retry 3 \
              --retry-all-errors \
              --connect-timeout 10 \
              --max-time 60 \
              -X POST \
              -H 'Content-Type: application/json' \
              -H "X-Build-Token: $BUILD_CI_TOKEN" \
              --data-binary "@$payload" \
              "https://new.syntaxdevteam.pl/api/builds/ci/$slug"
          }

          if [[ "$CORE_CHANGED" == true ]]; then
            publish punisherx build/punisherx.json
          fi
          if [[ "$BUNGEE_CHANGED" == true ]]; then
            publish punisherx-bungeecord-bridge build/punisherx-bungeecord-bridge.json
          fi
          if [[ "$VELOCITY_CHANGED" == true ]]; then
            publish punisherx-velocity-bridge build/punisherx-velocity-bridge.json
          fi

  dependency-submission:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Generate and submit dependency graph
        uses: gradle/actions/dependency-submission@v6
