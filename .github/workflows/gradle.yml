name: Build Plugin

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEXUS_USER: ${{ secrets.NEXUS_USER }}
      NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
      AES_KEY: ${{ secrets.AES_KEY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Cache Gradle dependencies
        uses: actions/cache@v5
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build with Gradle
        run: ./gradlew clean build

      - name: Zapisz raport Gradle Actions
        run: |
          mkdir -p build/reports/gradle-actions
          latest_report=$(ls /home/runner/work/_temp/.gradle-actions/build-results/__run_* | tail -n 1)
          cp "$latest_report" build/reports/gradle-actions/build-results.json

      - name: Upload build results
        uses: actions/upload-artifact@v7
        with:
          name: gradle-build-results
          path: build/reports/gradle-actions/build-results.json
          retention-days: 1
      - name: Prepare artifact suffix
        run: echo "ARTIFACT_SUFFIX=${GITHUB_REF_NAME//\//-}-latest-DEV" >> "$GITHUB_ENV"

      - name: Upload core JAR

        uses: actions/upload-artifact@v7
        with:
          name: PunisherX-${{ env.ARTIFACT_SUFFIX }}.jar
          path: punisherx-paper/build/libs/*.jar
          retention-days: 7
      - name: Upload bungee-bridge JAR
        uses: actions/upload-artifact@v7
        with:
          name: PunisherX-bungee-bridge-${{ env.ARTIFACT_SUFFIX }}.jar
          path: bungee-bridge/build/libs/*.jar
          retention-days: 7

      - name: Upload velocity-bridge JAR
        uses: actions/upload-artifact@v7
        with:
          name: PunisherX-velocity-bridge-${{ env.ARTIFACT_SUFFIX }}.jar
          path: velocity-bridge/build/libs/*.jar
          retention-days: 7
          

  dependency-submission:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Generate and submit dependency graph
        uses: gradle/actions/dependency-submission@v6
