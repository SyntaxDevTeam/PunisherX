repositories:
  syntaxdevteam-snapshots: "https://nexus.syntaxdevteam.pl/repository/maven-snapshots/"
  syntaxdevteam-releases: "https://nexus.syntaxdevteam.pl/repository/maven-releases/"
  paper: "https://repo.papermc.io/repository/maven-public/"
  central-mirror: "https://repo.papermc.io/repository/maven-central/"
  jitpack: "https://jitpack.io/"
  codemc-snapshots: "https://repo.codemc.io/repository/maven-snapshots/"
  faststatsReleases: "https://repo.faststats.dev/releases"

libraries:
  # Basic libraries
  - org.jetbrains.kotlin:kotlin-stdlib:2.4.0-Beta1
#  - org.jetbrains.kotlinx:kotlinx-coroutines-core:1.10.2
  - org.eclipse.aether:aether-api:1.1.0
  - org.yaml:snakeyaml:2.6
  - com.google.code.gson:gson:2.13.2
  # Additional libraries
  - com.maxmind.geoip2:geoip2:5.0.1
  - org.apache.ant:ant:1.10.17
  # Database libraries
  - com.zaxxer:HikariCP:7.0.2
  - org.mariadb.jdbc:mariadb-java-client:3.5.5
  - org.xerial:sqlite-jdbc:3.50.3.0
  - org.postgresql:postgresql:42.7.7
  - com.h2database:h2:2.3.232
  # Caching and utility libraries
  - com.github.ben-manes.caffeine:caffeine:3.2.3
  - dev.dejvokep:boosted-yaml:1.3.7
  # FastStats dependencies
  - coordinate: dev.faststats.metrics:bukkit:0.22.0
    repository: faststatsReleases
  # SyntaxDevTeam libraries
  - coordinate: pl.syntaxdevteam:core:1.3.0-R0.4-SNAPSHOT
    repository: syntaxdevteam-snapshots
  - coordinate: pl.syntaxdevteam:messageHandler-paper:1.2.0-R0.2-SNAPSHOT
    repository: syntaxdevteam-snapshots
